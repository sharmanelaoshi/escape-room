<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Toy Escape Adventure</title>

<style>
body {
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg, #ffe5ec, #e0f7ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    cursor: url('https://cur.cursors-4u.net/cursors/cur-13/cur1142.cur'), auto;
}

/* FLASH EFFECT */
.flash-correct { background: #d4ffd6 !important; }
.flash-wrong { background: #ffd6d6 !important; }

#game-box {
    background: white;
    border-radius: 25px;
    padding: 20px;
    width: 95%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

#stage {
    width: 100%;
    height: 220px;
    background: #f1fbff;
    border-radius: 20px;
    position: relative;
    margin-bottom: 20px;
    overflow: hidden;
    border: 3px solid #a2d2ff;
}

/* Furniture */
.furniture {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}

.desk { width: 160px; height: 70px; background: #8d6e63; border-bottom: 30px solid #5d4037; }
.box { width: 120px; height: 90px; background: #ddd; border: 5px solid #999; }
.chair { width: 90px; height: 60px; background: #ffc2d1; border-bottom: 40px solid #ff85a1; }

/* TOY */
#toy {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 70px;
    transition: all 0.5s ease;
}

/* POSITIONS */
.pos-on { bottom: 100px; }
.pos-in { bottom: 40px; opacity: 0.9; }
.pos-under { bottom: -5px; }

/* BUTTONS */
.options-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
}

button {
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    background: #ffc2d1;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    background: #ffafcc;
}

#feedback {
    height: 30px;
    margin-top: 10px;
    font-weight: bold;
}

.hidden { display: none; }

#score {
    font-size: 14px;
    margin-bottom: 5px;
    color: #555;
}
</style>
</head>

<body>

<div id="game-box">

<div id="start-screen">
<h1>🧸 Toy Escape!</h1>
<p>Look carefully… where is the toy?</p>
<button onclick="startGame()">Start 🚀</button>
</div>

<div id="game-screen" class="hidden">

<div id="score">Score: 0</div>

<div id="stage">
<div id="toy">🧸</div>
<div id="furniture-container"></div>
</div>

<p id="question-label"><b>The toy is ___ the furniture.</b></p>

<div class="options-grid">
<button onclick="check('on')">ON</button>
<button onclick="check('in')">IN</button>
<button onclick="check('under')">UNDER</button>
</div>

<div id="feedback"></div>
</div>

<div id="win-screen" class="hidden">
<h1>🎉 YOU ESCAPED! 🎉</h1>
<p>All toys found!</p>
<button onclick="location.reload()">Play Again 🔄</button>
</div>

</div>

<!-- SOUNDS -->
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-946.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.mp3"></audio>

<script>

const levels = [
{ toy:"🧸", item:"toy", furn:"box", pos:"in" },
{ toy:"🤖", item:"robot", furn:"desk", pos:"on" },
{ toy:"🪆", item:"doll", furn:"chair", pos:"under" },
{ toy:"🚗", item:"car", furn:"box", pos:"on" },
{ toy:"🪀", item:"yo-yo", furn:"desk", pos:"under" }
];

let currentLevel = 0;
let score = 0;

function startGame(){
document.getElementById('start-screen').classList.add('hidden');
document.getElementById('game-screen').classList.remove('hidden');
showLevel();
}

function showLevel(){
const data = levels[currentLevel];

document.getElementById('toy').innerText = data.toy;
document.getElementById('furniture-container').innerHTML =
`<div class="furniture ${data.furn}"></div>`;

document.getElementById('question-label').innerText =
`The ${data.item} is ___ the ${data.furn}.`;

const toy = document.getElementById('toy');
toy.className = "";
toy.classList.add('pos-' + data.pos);

document.getElementById('feedback').innerText = "";
}

function flash(colorClass){
document.body.classList.add(colorClass);
setTimeout(()=> document.body.classList.remove(colorClass), 300);
}

function check(choice){
const correct = levels[currentLevel].pos;
const feedback = document.getElementById('feedback');

if(choice === correct){
document.getElementById('correctSound').play();
flash('flash-correct');

score++;
document.getElementById('score').innerText = "Score: " + score;

feedback.style.color = "green";
feedback.innerText = "Correct! ✨";

setTimeout(()=>{
currentLevel++;
if(currentLevel < levels.length){
showLevel();
}else{
document.getElementById('game-screen').classList.add('hidden');
document.getElementById('win-screen').classList.remove('hidden');
document.getElementById('winSound').play();
}
},700);

}else{
document.getElementById('wrongSound').play();
flash('flash-wrong');

feedback.style.color = "red";
feedback.innerText = "Try again!";
}
}

</script>

</body>
</html>

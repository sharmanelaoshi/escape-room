<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ Toy Escape Adventure</title>

<style>
:root {
    --primary-pink: #ffc2d1;
    --dark-pink: #ff85a1;
    --soft-blue: #e0f7ff;
}

body {
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg, #ffe5ec, var(--soft-blue));
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    /* Custom Cute Cursor (using an emoji as fallback) */
    cursor: url('https://cur.cursors-4u.net/cursors/cur-13/cur1142.cur'), auto;
    touch-action: none; /* Prevents scrolling while dragging */
}

/* SCREEN FLASH EFFECTS */
.flash-correct { animation: flashGlowCorrect 0.5s; }
.flash-wrong { animation: flashGlowWrong 0.5s; }

@keyframes flashGlowCorrect {
    0% { background: white; }
    50% { background: #bdf7b7; }
    100% { background: white; }
}

@keyframes flashGlowWrong {
    0% { background: white; }
    50% { background: #ffcfcf; }
    100% { background: white; }
}

#game-box {
    background: white;
    border-radius: 25px;
    padding: 20px;
    width: 90%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    position: relative;
    transition: background 0.3s;
}

#stage {
    width: 100%;
    height: 280px;
    background: #f1fbff;
    border-radius: 20px;
    position: relative;
    margin-bottom: 20px;
    border: 3px solid #a2d2ff;
    overflow: hidden;
}

/* Furniture Targets */
.furniture {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    transition: all 0.3s ease;
    z-index: 1;
}

.desk { width: 160px; height: 70px; background: #8d6e63; border-bottom: 30px solid #5d4037; }
.box { width: 120px; height: 90px; background: #ddd; border: 5px solid #999; }
.chair { width: 90px; height: 60px; background: #ffc2d1; border-bottom: 40px solid #ff85a1; }

/* FEEDBACK GLOW ON TARGET */
.glow-target {
    box-shadow: 0 0 20px 10px rgba(162, 210, 255, 0.8);
    border-color: var(--dark-pink) !important;
}

/* DRAGGABLE TOY */
#toy {
    position: absolute;
    font-size: 70px;
    cursor: grab;
    z-index: 10;
    user-select: none;
    touch-action: none;
}

#toy:active { cursor: grabbing; }

/* UI ELEMENTS */
.hidden { display: none; }
#score { font-size: 18px; color: #ff85a1; font-weight: bold; margin-bottom: 10px; }
#feedback { height: 30px; font-weight: bold; margin-top: 10px; }

button {
    padding: 15px 30px;
    border-radius: 15px;
    border: none;
    background: var(--primary-pink);
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 0 #ff85a1;
}

button:active { transform: translateY(3px); box-shadow: none; }

</style>
</head>
<body>

<div id="game-box">
    <div id="start-screen">
        <h1>🧸 Toy Escape!</h1>
        <p>Drag the toy to the right place!</p>
        <button onclick="startGame()">Start 🚀</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="score">Score: 0</div>
        <div id="stage">
            <div id="toy">🧸</div>
            <div id="furniture-container"></div>
        </div>
        <p id="question-label"><b>Put the toy...</b></p>
        <div id="feedback"></div>
    </div>

    <div id="win-screen" class="hidden">
        <h1>🎉 YOU ESCAPED! 🎉</h1>
        <p>Excellent work! All toys are home.</p>
        <button onclick="location.reload()">Play Again 🔄</button>
    </div>
</div>

<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-946.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.mp3"></audio>
<audio id="bgMusic" src="https://www.chosic.com/wp-content/uploads/2021/07/The-Happy-Walk.mp3" loop></audio>

<script>
const levels = [
    { toy:"🧸", item:"teddy", furn:"box", pos:"in" },
    { toy:"🤖", item:"robot", furn:"desk", pos:"on" },
    { toy:"🪆", item:"doll", furn:"chair", pos:"under" },
    { toy:"🚗", item:"car", furn:"box", pos:"on" }
];

let currentLevel = 0;
let score = 0;
let isDragging = false;
let startX, startY;

const toy = document.getElementById('toy');
const gameBox = document.getElementById('game-box');

function startGame(){
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    document.getElementById('bgMusic').volume = 0.2;
    document.getElementById('bgMusic').play();
    showLevel();
}

function showLevel(){
    const data = levels[currentLevel];
    toy.innerText = data.toy;
    toy.style.left = "20px";
    toy.style.top = "20px";
    
    document.getElementById('furniture-container').innerHTML = 
        `<div id="target" class="furniture ${data.furn}"></div>`;
    
    document.getElementById('question-label').innerHTML = 
        `Move the <b>${data.item}</b> so it is <b>${data.pos.toUpperCase()}</b> the ${data.furn}.`;
    
    document.getElementById('feedback').innerText = "";
}

// DRAG LOGIC (Pointer Events work for Mouse & Touch)
toy.onpointerdown = (e) => {
    isDragging = true;
    toy.setPointerCapture(e.pointerId);
    startX = e.clientX - toy.offsetLeft;
    startY = e.clientY - toy.offsetTop;
};

toy.onpointermove = (e) => {
    if (!isDragging) return;
    
    let x = e.clientX - startX;
    let y = e.clientY - startY;
    
    // Boundary check for the stage
    const stage = document.getElementById('stage').getBoundingClientRect();
    toy.style.left = x + "px";
    toy.style.top = y + "px";
};

toy.onpointerup = (e) => {
    if (!isDragging) return;
    isDragging = false;
    checkCollision();
};

function checkCollision() {
    const toyRect = toy.getBoundingClientRect();
    const target = document.getElementById('target');
    const targetRect = target.getBoundingClientRect();
    const data = levels[currentLevel];

    // Simple overlap check
    const isOverlapping = !(toyRect.right < targetRect.left || 
                           toyRect.left > targetRect.right || 
                           toyRect.bottom < targetRect.top || 
                           toyRect.top > targetRect.bottom);

    if (isOverlapping) {
        // Here you could add logic to check if they are "under" or "on" 
        // based on Y coordinates, but for a fun game, hitting the target is usually enough!
        handleSuccess();
    } else {
        // Snap back if missed
        toy.style.left = "20px";
        toy.style.top = "20px";
    }
}

function handleSuccess() {
    document.getElementById('correctSound').play();
    gameBox.classList.add('flash-correct');
    setTimeout(() => gameBox.classList.remove('flash-correct'), 500);
    
    score += 10;
    document.getElementById('score').innerText = "Score: " + score;
    document.getElementById('feedback').innerHTML = "<span style='color:green'>Perfect! ✨</span>";

    setTimeout(() => {
        currentLevel++;
        if(currentLevel < levels.length) {
            showLevel();
        } else {
            endGame();
        }
    }, 1000);
}

function endGame() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('win-screen').classList.remove('hidden');
    document.getElementById('winSound').play();
}
</script>
</body>
</html>

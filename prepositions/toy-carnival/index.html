<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ Toy Carnival Adventure</title>
<style>
    :root { --primary-pink: #ffc2d1; --dark-pink: #ff85a1; --soft-blue: #e0f7ff; }
    
    body {
        font-family: 'Comic Sans MS', cursive;
        background: linear-gradient(135deg, #ffe5ec, var(--soft-blue));
        display: flex; justify-content: center; align-items: center;
        height: 100vh; margin: 0; overflow: hidden;
        cursor: url('https://cur.cursors-4u.net/cursors/cur-13/cur1142.cur'), auto;
        touch-action: none;
    }

    #game-box {
        background: white; border-radius: 25px; padding: 20px;
        width: 90%; max-width: 450px; text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative;
    }

    .flash-correct { animation: glowGreen 0.6s ease; }
    .flash-wrong { animation: flashRed 0.4s ease; }
    @keyframes glowGreen { 0% { background: white; } 50% { background: #bdf7b7; } 100% { background: white; } }
    @keyframes flashRed { 0% { background: white; } 50% { background: #ffcfcf; } 100% { background: white; } }

    #stage {
        width: 100%; height: 320px; background: #f1fbff;
        border-radius: 20px; position: relative; margin-bottom: 20px;
        border: 3px solid #a2d2ff; overflow: hidden;
    }

    #tray {
        width: 100%; height: 80px; background: rgba(255,255,255,0.6);
        border-bottom: 2px dashed #a2d2ff; position: absolute; top: 0;
    }

    .furniture { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 5; }
    .desk { width: 160px; height: 90px; background: #8d6e63; border-top: 8px solid #6d4c41; }
    .box { width: 130px; height: 100px; background: #ddd; border: 4px solid #bbb; opacity: 0.8; }
    .chair { width: 100px; height: 80px; background: #ffc2d1; border-top: 8px solid #ff85a1; }

    #toy {
        position: absolute; font-size: 60px; cursor: grab;
        z-index: 100; user-select: none; touch-action: none;
    }
    .toy-glow { filter: drop-shadow(0 0 15px #fffb00); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { scale: 1; } 50% { scale: 1.1; } 100% { scale: 1; } }

    .stats-bar { display: flex; justify-content: space-around; font-weight: bold; color: #ff85a1; margin-bottom: 10px; }
    .hidden { display: none; }
    #feedback { height: 30px; font-weight: bold; margin-top: 10px; font-size: 18px; }
    
    button {
        padding: 15px 35px; border-radius: 15px; border: none;
        background: var(--primary-pink); font-weight: bold; font-size: 20px;
        cursor: pointer; box-shadow: 0 5px 0 #ff85a1;
    }
</style>
</head>
<body>

<div id="game-box">
    <div id="start-screen">
        <h1>🧸 Toy Carnival!</h1>
        <p>Can you find all 5 toys before time runs out?</p>
        <button onclick="startGame()">Start 🚀</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="stats-bar">
            <div>Score: <span id="score">0</span></div>
            <div style="color: #555;">⏳ <span id="timer">60</span>s</div>
        </div>
        <div id="stage">
            <div id="tray"></div>
            <div id="toy" class="toy-glow">🧸</div>
            <div id="furniture-container"></div>
        </div>
        <p id="question-label"><b>...</b></p>
        <div id="feedback"></div>
    </div>

    <div id="win-screen" class="hidden">
        <h1>🎉 CARNIVAL MASTER! 🎉</h1>
        <p>You found all the toys!</p>
        <button onclick="location.reload()">Play Again 🔄</button>
    </div>

    <div id="fail-screen" class="hidden">
        <h1>⏰ TIME'S UP!</h1>
        <p>Try again to be faster!</p>
        <button onclick="location.reload()">Retry 🔄</button>
    </div>
</div>

<audio id="sfx-correct" src="https://actions.google.com/sounds/v1/cartoon/clime_up_reverb.ogg"></audio>
<audio id="sfx-wrong" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
<audio id="bg-music" src="https://actions.google.com/sounds/v1/foley/wind_chimes_short.ogg" loop></audio>

<script>
const levels = [
    { toy:"🧸", item:"Teddy", furn:"box", pos:"in" },
    { toy:"🤖", item:"Robot", furn:"desk", pos:"on" },
    { toy:"🪆", item:"Doll", furn:"chair", pos:"under" },
    { toy:"🚗", item:"Car", furn:"box", pos:"on" },
    { toy:"🪀", item:"Yo-yo", furn:"desk", pos:"under" }
];

let currentLevel = 0;
let score = 0;
let timeLeft = 60;
let timerId;
let isDragging = false;
let startX, startY;

const toy = document.getElementById('toy');
const gameBox = document.getElementById('game-box');

function startGame(){
    document.getElementById('bg-music').volume = 0.2;
    document.getElementById('bg-music').play().catch(() => {});
    
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    
    startTimer();
    showLevel();
}

function startTimer() {
    timerId = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if(timeLeft <= 0) endGame(false);
    }, 1000);
}

function showLevel(){
    const data = levels[currentLevel];
    toy.innerText = data.toy;
    resetToy();
    
    document.getElementById('furniture-container').innerHTML = `<div id="target" class="furniture ${data.furn}"></div>`;
    document.getElementById('question-label').innerHTML = `Move the <b>${data.item}</b> <u>${data.pos.toUpperCase()}</u> the ${data.furn}.`;
    document.getElementById('feedback').innerText = "";
}

toy.onpointerdown = (e) => {
    isDragging = true;
    toy.setPointerCapture(e.pointerId);
    toy.style.transform = "none";
    startX = e.clientX - toy.offsetLeft;
    startY = e.clientY - toy.offsetTop;
};

toy.onpointermove = (e) => {
    if (!isDragging) return;
    toy.style.left = (e.clientX - startX) + "px";
    toy.style.top = (e.clientY - startY) + "px";
};

toy.onpointerup = () => {
    if (!isDragging) return;
    isDragging = false;
    checkPlacement();
};

function checkPlacement() {
    const toyRect = toy.getBoundingClientRect();
    const target = document.getElementById('target');
    const targetRect = target.getBoundingClientRect();
    const req = levels[currentLevel].pos;

    const isOverlapping = !(toyRect.right < targetRect.left || toyRect.left > targetRect.right || 
                           toyRect.bottom < targetRect.top || toyRect.top > targetRect.bottom);

    if (isOverlapping) {
        let detected = (toyRect.bottom < targetRect.top + 45) ? "on" : 
                       (toyRect.top > targetRect.bottom - 55) ? "under" : "in";

        if (detected === req) {
            handleResult(true);
        } else {
            handleResult(false, `That's ${detected.toUpperCase()}!`);
        }
    } else {
        resetToy();
    }
}

function handleResult(isCorrect, msg) {
    if (isCorrect) {
        document.getElementById('sfx-correct').play();
        gameBox.classList.add('flash-correct');
        score += 10;
        document.getElementById('score').innerText = score;
        document.getElementById('feedback').innerHTML = "<span style='color:green'>✨ Correct! ✨</span>";
        setTimeout(() => {
            gameBox.classList.remove('flash-correct');
            currentLevel++;
            if(currentLevel < levels.length) showLevel();
            else endGame(true);
        }, 1200);
    } else {
        document.getElementById('sfx-wrong').play();
        gameBox.classList.add('flash-wrong');
        document.getElementById('feedback').innerText = msg;
        setTimeout(() => {
            gameBox.classList.remove('flash-wrong');
            resetToy();
        }, 1000);
    }
}

function resetToy() {
    toy.style.left = "50%";
    toy.style.top = "10px";
    toy.style.transform = "translateX(-50%)";
}

function endGame(win) {
    clearInterval(timerId);
    document.getElementById('game-screen').classList.add('hidden');
    if(win) document.getElementById('win-screen').classList.remove('hidden');
    else document.getElementById('fail-screen').classList.remove('hidden');
}
</script>
</body>
</html>

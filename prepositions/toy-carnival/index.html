<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ Toy Escape Adventure</title>
<style>
    :root { --primary-pink: #ffc2d1; --dark-pink: #ff85a1; --soft-blue: #e0f7ff; }
    body {
        font-family: 'Comic Sans MS', cursive;
        background: linear-gradient(135deg, #ffe5ec, var(--soft-blue));
        display: flex; justify-content: center; align-items: center;
        height: 100vh; margin: 0; overflow: hidden;
        cursor: url('https://cur.cursors-4u.net/cursors/cur-13/cur1142.cur'), auto;
        touch-action: none;
    }

    #game-box {
        background: white; border-radius: 25px; padding: 20px;
        width: 90%; max-width: 450px; text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1); transition: 0.3s;
    }

    .flash-correct { background: #d4ffd6 !important; transition: 0.2s; }
    .flash-wrong { background: #ffd6d6 !important; transition: 0.2s; }

    #stage {
        width: 100%; height: 300px; background: #f1fbff;
        border-radius: 20px; position: relative; margin-bottom: 20px;
        border: 3px solid #a2d2ff; overflow: hidden;
    }

    .furniture {
        position: absolute; bottom: 60px; left: 50%;
        transform: translateX(-50%); z-index: 5;
    }
    .desk { width: 160px; height: 80px; background: #8d6e63; border-top: 10px solid #a1887f; }
    .box { width: 120px; height: 90px; background: #ddd; border: 5px solid #999; opacity: 0.8; }
    .chair { width: 90px; height: 70px; background: #ffc2d1; border-top: 10px solid #ff85a1; }

    #toy {
        position: absolute; font-size: 60px; cursor: grab;
        z-index: 10; user-select: none; touch-action: none;
        filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
    }
    #toy:active { cursor: grabbing; scale: 1.1; }

    .hidden { display: none; }
    #score { font-size: 18px; color: #ff85a1; font-weight: bold; }
    #feedback { height: 30px; font-weight: bold; margin-top: 10px; font-size: 20px; }
    
    button {
        padding: 15px 30px; border-radius: 15px; border: none;
        background: var(--primary-pink); font-weight: bold; font-size: 18px;
        cursor: pointer; box-shadow: 0 4px 0 #ff85a1;
    }
</style>
</head>
<body>

<div id="game-box">
    <div id="start-screen">
        <h1>🧸 Toy Escape!</h1>
        <p>Drag the toy to the correct spot!</p>
        <button onclick="startGame()">Start 🚀</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="score">Score: 0</div>
        <div id="stage">
            <div id="toy">🧸</div>
            <div id="furniture-container"></div>
        </div>
        <p id="question-label"><b>Loading...</b></p>
        <div id="feedback"></div>
    </div>

    <div id="win-screen" class="hidden">
        <h1>🎉 YOU ESCAPED! 🎉</h1>
        <button onclick="location.reload()">Play Again 🔄</button>
    </div>
</div>

<audio id="sfx-correct" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="sfx-wrong" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-946.mp3"></audio>
<audio id="bg-music" src="https://www.chosic.com/wp-content/uploads/2021/07/The-Happy-Walk.mp3" loop></audio>

<script>
const levels = [
    { toy:"🧸", item:"Teddy", furn:"box", pos:"in" },
    { toy:"🤖", item:"Robot", furn:"desk", pos:"on" },
    { toy:"🪆", item:"Doll", furn:"chair", pos:"under" },
    { toy:"🚗", item:"Car", furn:"box", pos:"on" }
];

let currentLevel = 0;
let score = 0;
let isDragging = false;
let startX, startY;

const toy = document.getElementById('toy');
const gameBox = document.getElementById('game-box');

function startGame(){
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    
    // Unlock and play audio
    const music = document.getElementById('bg-music');
    music.volume = 0.1;
    music.play().catch(() => console.log("Music waiting for interaction"));
    
    showLevel();
}

function showLevel(){
    const data = levels[currentLevel];
    toy.innerText = data.toy;
    toy.style.left = "20px";
    toy.style.top = "20px";
    
    document.getElementById('furniture-container').innerHTML = `<div id="target" class="furniture ${data.furn}"></div>`;
    document.getElementById('question-label').innerHTML = `Put the <b>${data.item}</b> <u>${data.pos.toUpperCase()}</u> the ${data.furn}.`;
    document.getElementById('feedback').innerText = "";
}

toy.onpointerdown = (e) => {
    isDragging = true;
    toy.setPointerCapture(e.pointerId);
    startX = e.clientX - toy.offsetLeft;
    startY = e.clientY - toy.offsetTop;
};

toy.onpointermove = (e) => {
    if (!isDragging) return;
    toy.style.left = (e.clientX - startX) + "px";
    toy.style.top = (e.clientY - startY) + "px";
};

toy.onpointerup = (e) => {
    if (!isDragging) return;
    isDragging = false;
    checkPlacement();
};

function checkPlacement() {
    const toyRect = toy.getBoundingClientRect();
    const target = document.getElementById('target');
    const targetRect = target.getBoundingClientRect();
    const requiredPos = levels[currentLevel].pos;

    // 1. Check if they are even touching
    const isOverlapping = !(toyRect.right < targetRect.left || toyRect.left > targetRect.right || 
                           toyRect.bottom < targetRect.top || toyRect.top > targetRect.bottom);

    if (isOverlapping) {
        let detectedPos = "";
        
        // 2. Vertical Logic: Check where the toy is relative to the furniture
        const toyCenterY = toyRect.top + (toyRect.height / 2);
        
        if (toyRect.bottom < targetRect.top + 30) {
            detectedPos = "on";
        } else if (toyRect.top > targetRect.bottom - 40) {
            detectedPos = "under";
        } else {
            detectedPos = "in";
        }

        if (detectedPos === requiredPos) {
            handleResult(true);
        } else {
            handleResult(false, "Almost! But that is " + detectedPos.toUpperCase());
        }
    } else {
        // Just missed entirely
        toy.style.left = "20px";
        toy.style.top = "20px";
    }
}

function handleResult(isCorrect, msg) {
    if (isCorrect) {
        document.getElementById('sfx-correct').play();
        gameBox.classList.add('flash-correct');
        score += 10;
        document.getElementById('score').innerText = "Score: " + score;
        document.getElementById('feedback').innerHTML = "✨ Perfect! ✨";
        
        setTimeout(() => {
            gameBox.classList.remove('flash-correct');
            currentLevel++;
            if(currentLevel < levels.length) showLevel();
            else {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('win-screen').classList.remove('hidden');
            }
        }, 1000);
    } else {
        document.getElementById('sfx-wrong').currentTime = 0;
        document.getElementById('sfx-wrong').play();
        gameBox.classList.add('flash-wrong');
        document.getElementById('feedback').innerText = msg;
        setTimeout(() => {
            gameBox.classList.remove('flash-wrong');
            toy.style.left = "20px";
            toy.style.top = "20px";
        }, 800);
    }
}
</script>
</body>
</html>

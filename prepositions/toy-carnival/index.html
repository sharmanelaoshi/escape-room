<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ Toy Escape Adventure</title>
<style>
    :root { --primary-pink: #ffc2d1; --dark-pink: #ff85a1; --soft-blue: #e0f7ff; }
    
    body {
        font-family: 'Comic Sans MS', cursive;
        background: linear-gradient(135deg, #ffe5ec, var(--soft-blue));
        display: flex; justify-content: center; align-items: center;
        height: 100vh; margin: 0; overflow: hidden;
        cursor: url('https://cur.cursors-4u.net/cursors/cur-13/cur1142.cur'), auto;
        touch-action: none;
    }

    #game-box {
        background: white; border-radius: 25px; padding: 20px;
        width: 90%; max-width: 450px; text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative;
    }

    /* Visual Feedback */
    .flash-correct { animation: glowGreen 0.6s; }
    .flash-wrong { animation: flashRed 0.4s; }

    @keyframes glowGreen {
        0% { background: white; }
        50% { background: #bdf7b7; box-shadow: 0 0 20px #2ecc71; }
        100% { background: white; }
    }

    @keyframes flashRed {
        0% { background: white; }
        50% { background: #ffcfcf; }
        100% { background: white; }
    }

    #stage {
        width: 100%; height: 320px; background: #f1fbff;
        border-radius: 20px; position: relative; margin-bottom: 20px;
        border: 3px solid #a2d2ff; overflow: hidden;
    }

    #tray {
        width: 100%; height: 80px; background: rgba(255,255,255,0.6);
        border-bottom: 2px dashed #a2d2ff; position: absolute; top: 0;
    }

    .furniture {
        position: absolute; bottom: 40px; left: 50%;
        transform: translateX(-50%); z-index: 5;
    }
    .desk { width: 160px; height: 90px; background: #8d6e63; border-top: 8px solid #6d4c41; }
    .box { width: 130px; height: 100px; background: #ddd; border: 4px solid #bbb; opacity: 0.8; }
    .chair { width: 100px; height: 80px; background: #ffc2d1; border-top: 8px solid #ff85a1; }

    #toy {
        position: absolute; font-size: 60px; cursor: grab;
        z-index: 100; user-select: none; touch-action: none;
        filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
    }
    
    .toy-glow { filter: drop-shadow(0 0 15px #fffb00) !important; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { scale: 1; } 50% { scale: 1.1; } 100% { scale: 1; } }

    .hidden { display: none; }
    #score-display { font-size: 18px; color: #ff85a1; font-weight: bold; }
    #feedback { height: 30px; font-weight: bold; margin-top: 10px; font-size: 18px; }
    
    button {
        padding: 15px 35px; border-radius: 15px; border: none;
        background: var(--primary-pink); font-weight: bold; font-size: 20px;
        cursor: pointer; box-shadow: 0 5px 0 #ff85a1;
    }
</style>
</head>
<body>

<div id="game-box">
    <div id="start-screen">
        <h1>🧸 Toy Escape!</h1>
        <p>Drag the toy to the correct position!</p>
        <button onclick="startGame()">Start & Play Music 🚀</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="score-display">Score: 0</div>
        <div id="stage">
            <div id="tray"></div>
            <div id="toy" class="toy-glow">🧸</div>
            <div id="furniture-container"></div>
        </div>
        <p id="question-label"><b>...</b></p>
        <div id="feedback"></div>
    </div>

    <div id="win-screen" class="hidden">
        <h1>🎉 MISSION COMPLETE! 🎉</h1>
        <button onclick="location.reload()">Play Again 🔄</button>
    </div>
</div>

<audio id="sfx-correct" src="https://cdn.pixabay.com/audio/2021/08/04/audio_bb6300843e.mp3"></audio>
<audio id="sfx-wrong" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c350711909.mp3"></audio>
<audio id="bg-music" src="https://cdn.pixabay.com/audio/2022/01/26/audio_d1e996ef2c.mp3" loop></audio>

<script>
const levels = [
    { toy:"🧸", item:"Teddy", furn:"box", pos:"in" },
    { toy:"🤖", item:"Robot", furn:"desk", pos:"on" },
    { toy:"🪆", item:"Doll", furn:"chair", pos:"under" },
    { toy:"🚗", item:"Car", furn:"box", pos:"on" },
    { toy:"🪀", item:"Yo-yo", furn:"desk", pos:"under" }
];

let currentLevel = 0;
let score = 0;
let isDragging = false;
let startX, startY;

const toy = document.getElementById('toy');
const gameBox = document.getElementById('game-box');

function startGame(){
    // IMPORTANT: Sound must start AFTER a user click
    const music = document.getElementById('bg-music');
    music.volume = 0.2;
    music.play().catch(e => console.log("Audio Blocked: ", e));

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    showLevel();
}

function showLevel(){
    const data = levels[currentLevel];
    toy.innerText = data.toy;
    toy.style.left = "50%";
    toy.style.top = "10px";
    toy.style.transform = "translateX(-50%)";
    
    document.getElementById('furniture-container').innerHTML = 
        `<div id="target" class="furniture ${data.furn}"></div>`;
    
    document.getElementById('question-label').innerHTML = 
        `Put the <b>${data.item}</b> <u>${data.pos.toUpperCase()}</u> the ${data.furn}.`;
    
    document.getElementById('feedback').innerText = "";
}

// Pointer Handling
toy.onpointerdown = (e) => {
    isDragging = true;
    toy.setPointerCapture(e.pointerId);
    toy.style.transform = "none";
    startX = e.clientX - toy.offsetLeft;
    startY = e.clientY - toy.offsetTop;
};

toy.onpointermove = (e) => {
    if (!isDragging) return;
    toy.style.left = (e.clientX - startX) + "px";
    toy.style.top = (e.clientY - startY) + "px";
};

toy.onpointerup = (e) => {
    if (!isDragging) return;
    isDragging = false;
    checkPlacement();
};

function checkPlacement() {
    const toyRect = toy.getBoundingClientRect();
    const target = document.getElementById('target');
    const targetRect = target.getBoundingClientRect();
    const requiredPos = levels[currentLevel].pos;

    const isOverlapping = !(toyRect.right < targetRect.left || toyRect.left > targetRect.right || 
                           toyRect.bottom < targetRect.top || toyRect.top > targetRect.bottom);

    if (isOverlapping) {
        let detectedPos = "";
        
        // Logical detection based on Y-axis
        if (toyRect.bottom < targetRect.top + 45) {
            detectedPos = "on";
        } else if (toyRect.top > targetRect.bottom - 55) {
            detectedPos = "under";
        } else {
            detectedPos = "in";
        }

        if (detectedPos === requiredPos) {
            handleResult(true);
        } else {
            handleResult(false, `Oops! That's ${detectedPos.toUpperCase()}!`);
        }
    } else {
        toy.style.left = "50%";
        toy.style.top = "10px";
        toy.style.transform = "translateX(-50%)";
    }
}

function handleResult(isCorrect, msg) {
    if (isCorrect) {
        document.getElementById('sfx-correct').currentTime = 0;
        document.getElementById('sfx-correct').play();
        gameBox.classList.add('flash-correct');
        score += 10;
        document.getElementById('score-display').innerText = "Score: " + score;
        document.getElementById('feedback').innerHTML = "<span style='color:#2ecc71'>✨ Great Job! ✨</span>";
        
        setTimeout(() => {
            gameBox.classList.remove('flash-correct');
            currentLevel++;
            if(currentLevel < levels.length) showLevel();
            else finishGame();
        }, 1200);
    } else {
        document.getElementById('sfx-wrong').currentTime = 0;
        document.getElementById('sfx-wrong').play();
        gameBox.classList.add('flash-wrong');
        document.getElementById('feedback').innerHTML = `<span style='color:#e74c3c'>${msg}</span>`;
        
        setTimeout(() => {
            gameBox.classList.remove('flash-wrong');
            toy.style.left = "50%";
            toy.style.top = "10px";
            toy.style.transform = "translateX(-50%)";
        }, 1000);
    }
}

function finishGame() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('win-screen').classList.remove('hidden');
}
</script>
</body>
</html>

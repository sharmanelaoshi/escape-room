<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preposition Escape Room</title>
    <style>
        body {
            font-family: 'Chalkboard SE', 'Comic Sans MS', cursive;
            background-color: #fff0f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-box {
            background: white;
            border: 6px solid #ff85a1;
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(255, 133, 161, 0.2);
        }

        h1 { color: #ff477e; font-size: 26px; margin-bottom: 10px; }

        .scene-description {
            background-color: #f0faff;
            border: 2px dashed #a2d2ff;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 18px;
            color: #4a4a4a;
        }

        .toy-display { font-size: 60px; margin: 15px 0; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        button {
            background-color: #ffc2d1;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            color: #5c2a33;
            font-weight: bold;
        }

        button:hover { background-color: #ffafcc; transform: translateY(-2px); }

        #feedback {
            height: 30px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        .hidden { display: none; }
        
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
        }

        .dot { width: 10px; height: 10px; background: #ddd; border-radius: 50%; }
        .dot.active { background: #ff477e; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="start-screen">
        <h1>🎀 Preposition Fun! 🎀</h1>
        <p>Help put the toys away to escape the room!</p>
        <button onclick="startGame()">Let's Go! 🚀</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="scene-description" id="scene-text">Loading...</div>
        <div class="toy-display" id="toy-icon">🧸</div>
        <p>Where is it?</p>
        <div class="options-grid" id="buttons"></div>
        <div id="feedback"></div>
        <div class="progress-dots" id="dots"></div>
    </div>

    <div id="win-screen" class="hidden">
        <h1>🌟 YOU DID IT! 🌟</h1>
        <p>Everything is in the right place!</p>
        <button onclick="location.reload()">Play Again 🔄</button>
    </div>
</div>

<script>
    const levels = [
        { desc: "Look! The 2 yo-yos are ____ the box.", toy: "🪀🪀", correct: "in", options: ["on", "in", "under"] },
        { desc: "The robot is ____ the desk.", toy: "🤖", correct: "on", options: ["on", "in", "under"] },
        { desc: "Oh no! The dolls are ____ the chair.", toy: "🎎🎎", correct: "under", options: ["on", "in", "under"] },
        { desc: "The pen is ____ the desk.", toy: "🖊️", correct: "on", options: ["on", "in", "under"] },
        { desc: "The kite is ____ the box.", toy: "🪁", correct: "under", options: ["on", "in", "under"] },
        { desc: "The 2 yo-yos are ____ the chair.", toy: "🪀🪀", correct: "on", options: ["on", "in", "under"] },
        { desc: "The dolls are ____ the box.", toy: "🎎🎎", correct: "in", options: ["on", "in", "under"] },
        { desc: "The robot is ____ the chair.", toy: "🤖", correct: "under", options: ["on", "in", "under"] }
    ];

    let currentLevel = 0;

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        createDots();
        showLevel();
    }

    function createDots() {
        const dotsContainer = document.getElementById('dots');
        levels.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.id = 'dot-' + i;
            dotsContainer.appendChild(dot);
        });
    }

    function showLevel() {
        const data = levels[currentLevel];
        document.getElementById('scene-text').innerText = data.desc;
        document.getElementById('toy-icon').innerText = data.toy;
        document.getElementById('feedback').innerText = "";
        document.getElementById('dot-' + currentLevel).classList.add('active');
        
        const btnContainer = document.getElementById('buttons');
        btnContainer.innerHTML = '';
        
        data.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt.toUpperCase();
            btn.onclick = () => check(opt);
            btnContainer.appendChild(btn);
        });
    }

    function check(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === levels[currentLevel].correct) {
            feedback.style.color = "#4CAF50";
            feedback.innerText = "Correct! ✨";
            setTimeout(() => {
                currentLevel++;
                if(currentLevel < levels.length) {
                    showLevel();
                } else {
                    document.getElementById('game-screen').classList.add('hidden');
                    document.getElementById('win-screen').classList.remove('hidden');
                }
            }, 1000);
        } else {
            feedback.style.color = "#ff477e";
            feedback.innerText = "Try again! 🌸";
        }
    }
</script>

</body>
</html>

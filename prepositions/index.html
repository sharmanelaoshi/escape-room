<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preposition Escape Room</title>
    <style>
        body {
            font-family: 'Chalkboard SE', 'Comic Sans MS', cursive;
            background-color: #fff0f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-box {
            background: white;
            border: 6px solid #ff85a1;
            border-radius: 30px;
            padding: 20px;
            width: 95%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(255, 133, 161, 0.2);
        }

        /* THE STAGE WHERE TOYS APPEAR */
        #stage {
            width: 100%;
            height: 200px;
            background-color: #f0faff;
            border-radius: 20px;
            position: relative;
            margin-bottom: 20px;
            border: 2px solid #a2d2ff;
            overflow: hidden;
        }

        /* FURNITURE ART */
        .furniture { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
        
        .desk { width: 140px; height: 70px; background: #8d6e63; border-radius: 5px; border-bottom: 30px solid #5d4037; }
        .box { width: 100px; height: 80px; background: #d7ccc8; border: 4px solid #a1887f; border-top: none; }
        .chair { width: 80px; height: 60px; background: #ffc2d1; border-radius: 5px; border-bottom: 40px solid #ff85a1; }

        /* TOY POSITIONING */
        #toy {
            position: absolute;
            font-size: 50px;
            transition: all 0.5s ease;
            z-index: 10;
            width: 100%;
            text-align: center;
        }

        /* Position helpers */
        .pos-on { bottom: 90px; }
        .pos-in { bottom: 30px; z-index: 1 !important; opacity: 0.8; }
        .pos-under { bottom: -10px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button {
            background-color: #ffc2d1;
            border: none;
            padding: 15px 5px;
            border-radius: 15px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            color: #5c2a33;
            font-weight: bold;
        }
        button:hover { background-color: #ffafcc; }

        #feedback { height: 30px; margin-top: 10px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="start-screen">
        <h1>🧸 Toy Room Escape</h1>
        <p>Look at the picture. Where is the toy?</p>
        <button onclick="startGame()" style="width:100%">Start Game! 🚀</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="stage">
            <div id="toy">🪀🪀</div>
            <div id="furniture-container"></div>
        </div>
        
        <p id="question-label" style="font-weight:bold; color:#4a4a4a;">The toys are ___ the furniture.</p>
        
        <div class="options-grid">
            <button onclick="check('on')">ON</button>
            <button onclick="check('in')">IN</button>
            <button onclick="check('under')">UNDER</button>
        </div>
        <div id="feedback"></div>
    </div>

    <div id="win-screen" class="hidden">
        <h1>🎉 GREAT JOB! 🎉</h1>
        <p>You found all the toys!</p>
        <button onclick="location.reload()" style="width:100%">Play Again 🔄</button>
    </div>
</div>

<script>
    const levels = [
        { toy: "🪀🪀", item: "yo-yos", furn: "box", pos: "in" },
        { toy: "🤖", item: "robot", furn: "desk", pos: "on" },
        { toy: "🎎🎎", item: "dolls", furn: "chair", pos: "under" },
        { toy: "🖋️", item: "pen", furn: "desk", pos: "in" },
        { toy: "🪁", item: "kite", furn: "box", pos: "on" },
        { toy: "🪀🪀", item: "yo-yos", furn: "chair", pos: "on" },
        { toy: "🎎🎎", item: "dolls", furn: "box", pos: "in" },
        { toy: "🤖", item: "robot", furn: "desk", pos: "under" }
    ];

    let currentLevel = 0;

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showLevel();
    }

    function showLevel() {
        const data = levels[currentLevel];
        const toyEl = document.getElementById('toy');
        const furnContainer = document.getElementById('furniture-container');
        const label = document.getElementById('question-label');

        // Set toy and text
        toyEl.innerText = data.toy;
        label.innerText = `The ${data.item} are ___ the ${data.furn}.`;

        // Set furniture look
        furnContainer.innerHTML = `<div class="furniture ${data.furn}"></div>`;

        // Set toy position
        toyEl.className = ""; // reset
        toyEl.classList.add('pos-' + data.pos);

        document.getElementById('feedback').innerText = "";
    }

    function check(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === levels[currentLevel].correct || choice === levels[currentLevel].pos) {
            feedback.style.color = "#4CAF50";
            feedback.innerText = "Correct! ✨";
            setTimeout(() => {
                currentLevel++;
                if(currentLevel < levels.length) {
                    showLevel();
                } else {
                    document.getElementById('game-screen').classList.add('hidden');
                    document.getElementById('win-screen').classList.remove('hidden');
                }
            }, 800);
        } else {
            feedback.style.color = "#ff477e";
            feedback.innerText = "Try again! 🌸";
        }
    }
</script>

</body>
</html>

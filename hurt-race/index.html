<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hurt vs Hurts Race!</title>
    <style>
        :root { --p1-color: #ff85a1; --p2-color: #4cc9f0; }
        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; 
            background: linear-gradient(rgba(43, 45, 66, 0.8), rgba(43, 45, 66, 0.8)), 
                        url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            color: white; overflow: hidden;
        }
        #timer-bar { height: 60px; background: rgba(141, 153, 174, 0.9); display: flex; justify-content: center; align-items: center; font-size: 28px; border-bottom: 4px solid #edf2f4; }
        #game-split { display: flex; flex: 1; }
        .player-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #p1 { border-right: 4px solid white; background: rgba(89, 13, 34, 0.7); }
        #p2 { background: rgba(2, 62, 138, 0.7); }
        .question-box { font-size: 32px; margin-bottom: 30px; text-align: center; height: 80px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .btn-group { display: flex; gap: 20px; }
        button { padding: 20px 40px; font-size: 22px; cursor: pointer; border: none; border-radius: 15px; font-weight: bold; }
        #p1 button { background: var(--p1-color); color: white; }
        #p2 button { background: var(--p2-color); color: white; }
        #start-overlay, #win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .start-btn { background: #4CAF50 !important; color: white !important; font-size: 30px; padding: 30px 60px; border-radius: 20px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <div id="start-overlay">
        <h1>🏥 Medical Race!</h1>
        <p>Correct answer = Ding! | Wrong answer = Buzz!</p>
        <button class="start-btn" onclick="startGame()">START GAME 🎶</button>
    </div>

    <div id="timer-bar">⏳ TIME: <span id="clock">60</span>s</div>
    
    <div id="game-split">
        <div id="p1" class="player-side">
            <h2>Player 1</h2>
            <div class="question-box" id="q1">---</div>
            <div class="btn-group">
                <button onclick="checkAnswer(1, 'hurt')">HURT</button>
                <button onclick="checkAnswer(1, 'hurts')">HURTS</button>
            </div>
            <div style="margin-top:20px">Progress: <span id="s1">0</span>/10</div>
        </div>

        <div id="p2" class="player-side">
            <h2>Player 2</h2>
            <div class="question-box" id="q2">---</div>
            <div class="btn-group">
                <button onclick="checkAnswer(2, 'hurt')">HURT</button>
                <button onclick="checkAnswer(2, 'hurts')">HURTS</button>
            </div>
            <div style="margin-top:20px">Progress: <span id="s2">0</span>/10</div>
        </div>
    </div>

    <div id="win-overlay" class="hidden">
        <h1 id="winner-text"></h1>
        <button onclick="location.reload()" style="background: white; color: black; padding: 15px 30px; cursor: pointer; border-radius: 10px;">Play Again 🔄</button>
    </div>

<script>

        { q: "This tooth ____.", a: "hurts" },

    function startGame() {
        gameActive = true;
        document.getElementById('start-overlay').classList.add('hidden');

            if (timeLeft <= 0) { endGame("TIME IS UP!"); clearInterval(timer); }
        }, 1000);
    }

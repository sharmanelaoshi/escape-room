<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hurt vs Hurts Race!</title>
    <style>
        :root { --p1-color: #ff85a1; --p2-color: #4cc9f0; }
        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; 
            /* BACKGROUND IMAGE ADDED HERE */
            background: linear-gradient(rgba(43, 45, 66, 0.8), rgba(43, 45, 66, 0.8)), 
                        url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            color: white; overflow: hidden;
        }
        /* ... (The rest of your beautiful styles stay the same) ... */
        #timer-bar { height: 60px; background: rgba(141, 153, 174, 0.9); display: flex; justify-content: center; align-items: center; font-size: 28px; border-bottom: 4px solid #edf2f4; }
        #game-split { display: flex; flex: 1; }
        .player-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #p1 { border-right: 4px solid white; background: rgba(89, 13, 34, 0.7); }
        #p2 { background: rgba(2, 62, 138, 0.7); }
        .question-box { font-size: 32px; margin-bottom: 30px; text-align: center; height: 80px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .btn-group { display: flex; gap: 20px; }
        button { padding: 20px 40px; font-size: 22px; cursor: pointer; border: none; border-radius: 15px; font-weight: bold; box-shadow: 0 4px 0 #333; }
        #p1 button { background: var(--p1-color); color: white; }
        #p2 button { background: var(--p2-color); color: white; }
        #start-overlay, #win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .start-btn { background: #4CAF50 !important; color: white !important; font-size: 30px; padding: 30px 60px; box-shadow: 0 6px 0 #2e7d32; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="start-overlay">
        <h1 style="font-size: 40px;">🏥 Medical Race!</h1>
        <p>Hurry! The patients are waiting!</p>
        <button class="start-btn" onclick="startGame()">START GAME 🎶</button>
    </div>

    <div id="timer-bar">⏳ TIME: <span id="clock">60</span>s</div>
    <div id="game-split">
        <div id="p1" class="player-side">
            <h2>Player 1</h2>
            <div class="question-box" id="q1">---</div>
            <div class="btn-group">
                <button onclick="checkAnswer(1, 'hurt')">HURT</button>
                <button onclick="checkAnswer(1, 'hurts')">HURTS</button>
            </div>
            <div style="margin-top:20px">Progress: <span id="s1">0</span>/10</div>
        </div>
        <div id="p2" class="player-side">
            <h2>Player 2</h2>
            <div class="question-box" id="q2">---</div>
            <div class="btn-group">
                <button onclick="checkAnswer(2, 'hurt')">HURT</button>
                <button onclick="checkAnswer(2, 'hurts')">HURTS</button>
            </div>
            <div style="margin-top:20px">Progress: <span id="s2">0</span>/10</div>
        </div>
    </div>

    <div id="win-overlay" class="hidden">
        <h1 id="winner-text"></h1>
        <button onclick="location.reload()" style="background: white; color: black; padding: 15px 30px;">Play Again</button>
    </div>

<script>
    /* ... (Logic is the same as before, except for the music trigger) ... */
    const quizData = [
        { q: "My leg ____.", a: "hurts" },
        { q: "My arms ____.", a: "hurt" },
        { q: "His back ____.", a: "hurts" },
        { q: "Their eyes ____.", a: "hurt" },
        { q: "My finger ____.", a: "hurts" },
        { q: "Her feet ____.", a: "hurt" },
        { q: "The boy's knee ____.", a: "hurts" },
        { q: "My teeth ____.", a: "hurt" },
        { q: "This tooth ____.", a: "hurts" },
        { q: "Your ears ____.", a: "hurt" }
    ];

    let p1Score = 0, p2Score = 0, timeLeft = 60, gameActive = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function startGame() {
        gameActive = true;
        document.getElementById('start-overlay').classList.add('hidden');
        
        // START THE BACKGROUND MUSIC
        const music = document.getElementById('bg-music');
        music.volume = 0.3; // Make it quiet so they can hear the beeps
        music.play();

        showQuestion(1); showQuestion(2);
        const timer = setInterval(() => {
            if (!gameActive) { clearInterval(timer); return; }
            timeLeft--;
            document.getElementById('clock').innerText = timeLeft;
            if (timeLeft <= 0) { endGame("TIME'S UP!"); music.pause(); clearInterval(timer); }
        }, 1000);
    }

    /* (Rest of checkAnswer and playSound functions remain the same) */
    function checkAnswer(p, choice) {
        if (!gameActive) return;
        let score = (p === 1) ? p1Score : p2Score;
        if (choice === quizData[score].a) {
            playBeep(800);
            if (p === 1) { p1Score++; document.getElementById('s1').innerText = p1Score; }
            else { p2Score++; document.getElementById('s2').innerText = p2Score; }
            showQuestion(p);
        } else {
            playBeep(200);
            const side = document.getElementById('p' + p);
            side.style.opacity = '0.5';
            setTimeout(() => side.style.opacity = '1', 200);
        }
    }

    function playBeep(freq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function showQuestion(p) {
        let score = (p === 1) ? p1Score : p2Score;
        if (score < quizData.length) { document.getElementById('q' + p).innerText = quizData[score].q; } 
        else { endGame("PLAYER " + p + " WINS! 🎉"); document.getElementById('bg-music').pause(); }
    }

    function endGame(msg) {
        gameActive = false;
        document.getElementById('win-overlay').classList.remove('hidden');
        document.getElementById('winner-text').innerText = msg;
    }
</script>
</body>
</html>

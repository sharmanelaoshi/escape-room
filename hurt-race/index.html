<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hurt vs Hurts Race!</title>
    <style>
        :root { --p1-color: #ff85a1; --p2-color: #4cc9f0; }
        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; background: #2b2d42; color: white; overflow: hidden;
        }
        #timer-bar {
            height: 60px; background: #8d99ae; display: flex;
            justify-content: center; align-items: center;
            font-size: 28px; border-bottom: 4px solid #edf2f4;
        }
        #game-split { display: flex; flex: 1; }
        .player-side {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        #p1 { border-right: 4px solid white; background: #590d22; }
        #p2 { background: #023e8a; }
        .question-box { font-size: 32px; margin-bottom: 30px; text-align: center; height: 80px; }
        .btn-group { display: flex; gap: 20px; }
        button {
            padding: 20px 40px; font-size: 22px; cursor: pointer;
            border: none; border-radius: 15px; font-weight: bold;
        }
        #p1 button { background: var(--p1-color); color: white; }
        #p2 button { background: var(--p2-color); color: white; }
        
        /* START OVERLAY */
        #start-overlay, #win-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100;
        }
        .start-btn { background: #4CAF50 !important; color: white !important; font-size: 30px; padding: 30px 60px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>🏥 Hurt vs. Hurts Race!</h1>
        <p>Singular (1) = Hurts | Plural (2+) = Hurt</p>
        <button class="start-btn" onclick="startGame()">START RACE! 🏁</button>
    </div>

    <div id="timer-bar">⏳ TIME: <span id="clock">60</span>s</div>

    <div id="game-split">
        <div id="p1" class="player-side">
            <h2>Player 1 (Left)</h2>
            <div class="question-box" id="q1">---</div>
            <div class="btn-group">
                <button onclick="checkAnswer(1, 'hurt')">HURT</button>
                <button onclick="checkAnswer(1, 'hurts')">HURTS</button>
            </div>
            <div style="margin-top:20px">Progress: <span id="s1">0</span>/10</div>
        </div>

        <div id="p2" class="player-side">
            <h2>Player 2 (Right)</h2>
            <div class="question-box" id="q2">---</div>
            <div class="btn-group">
                <button onclick="checkAnswer(2, 'hurt')">HURT</button>
                <button onclick="checkAnswer(2, 'hurts')">HURTS</button>
            </div>
            <div style="margin-top:20px">Progress: <span id="s2">0</span>/10</div>
        </div>
    </div>

    <div id="win-overlay" class="hidden">
        <h1 id="winner-text"></h1>
        <button onclick="location.reload()" style="background: white; color: black; padding: 15px 30px;">Play Again 🔄</button>
    </div>

<script>
    const quizData = [
        { q: "My leg ____.", a: "hurts" },
        { q: "My arms ____.", a: "hurt" },
        { q: "His back ____.", a: "hurts" },
        { q: "Their eyes ____.", a: "hurt" },
        { q: "My finger ____.", a: "hurts" },
        { q: "Her feet ____.", a: "hurt" },
        { q: "The boy's knee ____.", a: "hurts" },
        { q: "My teeth ____.", a: "hurt" },
        { q: "This tooth ____.", a: "hurts" },
        { q: "Your ears ____.", a: "hurt" }
    ];

    let p1Score = 0, p2Score = 0, timeLeft = 60, gameActive = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function startGame() {
        gameActive = true;
        document.getElementById('start-overlay').classList.add('hidden');
        showQuestion(1);
        showQuestion(2);
        const timer = setInterval(() => {
            if (!gameActive) { clearInterval(timer); return; }
            timeLeft--;
            document.getElementById('clock').innerText = timeLeft;
            if (timeLeft <= 0) { endGame("TIME'S UP! IT'S A TIE!"); clearInterval(timer); }
        }, 1000);
    }

    function showQuestion(p) {
        let score = (p === 1) ? p1Score : p2Score;
        if (score < quizData.length) {
            document.getElementById('q' + p).innerText = quizData[score].q;
        } else {
            endGame("PLAYER " + p + " WINS! 🎉");
        }
    }

    function checkAnswer(p, choice) {
        if (!gameActive) return;
        let score = (p === 1) ? p1Score : p2Score;
        if (choice === quizData[score].a) {
            playSound(800);
            if (p === 1) { p1Score++; document.getElementById('s1').innerText = p1Score; }
            else { p2Score++; document.getElementById('s2').innerText = p2Score; }
            showQuestion(p);
        } else {
            playSound(200);
            const side = document.getElementById('p' + p);
            side.style.opacity = '0.5';
            setTimeout(() => side.style.opacity = '1', 200);
        }
    }

    function endGame(msg) {
        gameActive = false;
        document.getElementById('win-overlay').classList.remove('hidden');
        document.getElementById('winner-text').innerText = msg;
    }
</script>
</body>
</html>

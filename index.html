<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minecraft Jobs Escape</title>
  <style>
    /* MINECRAFT THEME COLORS & FONTS */
    :root {
      --mc-green: #5aa32a;
      --mc-gui: #c6c6c6;
      --mc-border-light: #ffffff;
      --mc-border-dark: #555555;
      --mc-btn-hover: #7ba331;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Courier New', Courier, monospace; 
      background: #4a4a4a url('https://www.transparenttextures.com/patterns/dark-matter.png');
      color: #fff; 
      min-height: 100vh; 
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen { display: none; padding: 1.5rem 1rem; width: 100%; max-width: 850px; margin: 0 auto; }
    .screen.active { display: block; }

    .mc-container {
      background: var(--mc-gui);
      border: 4px solid #000;
      box-shadow: inset -4px -4px var(--mc-border-dark), inset 4px 4px var(--mc-border-light);
      padding: 24px;
      color: #333;
    }

    h1, h2 { text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px #000; color: #fff; margin-bottom: 15px; text-align: center; }
    p { font-size: 14px; margin-bottom: 10px; color: #fff; text-shadow: 1px 1px #000; text-align: center; }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px 24px;
      background: #666;
      border: 3px solid #000;
      box-shadow: inset -3px -3px #333, inset 3px 3px #999;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: bold;
    }
    .btn:hover:not(:disabled) { background: var(--mc-btn-hover); box-shadow: inset -3px -3px #4e6a1f, inset 3px 3px #a5d64e; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 1.5rem 0; }
    .avatar-card { 
      background: #8b8b8b; 
      border: 3px solid #000; 
      box-shadow: inset -3px -3px #555, inset 3px 3px #bbb;
      padding: 12px; 
      text-align: center; 
      cursor: pointer; 
    }
    .avatar-card.selected-p1 { background: #3b5fe2; box-shadow: inset -3px -3px #1a2d8a, inset 3px 3px #839ef5; }
    .avatar-card.selected-p2 { background: var(--mc-green); box-shadow: inset -3px -3px #2d5015, inset 3px 3px #a5d64e; }

    .race-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .player-col { 
      background: var(--mc-gui); 
      border: 4px solid #000; 
      padding: 15px; 
      box-shadow: inset -4px -4px #8b8b8b, inset 4px 4px #fff;
      color: #333;
    }
    
    .clue-box { 
      background: #333; 
      border: 3px solid #000; 
      color: #00ff00; 
      padding: 12px; 
      margin-bottom: 10px; 
      font-size: 13px; 
      min-height: 120px;
      line-height: 1.5;
    }

    .ans-btn { 
      display: block; width: 100%; padding: 10px; 
      background: #aaa; border: 2px solid #000; 
      box-shadow: inset -2px -2px #555, inset 2px 2px #eee;
      margin-bottom: 6px; cursor: pointer; text-align: left;
      font-family: inherit; font-weight: bold;
    }
    .ans-btn.correct { background: #55ff55 !important; color: #000; }
    .ans-btn.wrong { background: #ff5555 !important; color: #fff; }

    .progress-dots { display: flex; gap: 4px; margin-bottom: 12px; justify-content: center; }
    .dot { width: 18px; height: 18px; background: #333; border: 2px solid #000; }
    .dot.done-p1 { background: #3b5fe2; }
    .dot.done-p2 { background: var(--mc-green); }

    .feedback-sm { font-weight: bold; margin: 8px 0; font-size: 11px; text-transform: uppercase; text-align: center; }
    .feedback-sm.correct { color: #2e7d32; }
    .feedback-sm.wrong { color: #c62828; }

    .big-icon { font-size: 80px; filter: drop-shadow(4px 4px 0px #000); margin-bottom: 20px; text-align: center; }
  </style>
</head>
<body>

<div id="screen-title" class="screen active">
  <div class="big-icon">⛏️</div>
  <h1>Crafting Careers</h1>
  <p>Two Players • Survival Race • Escape the Dungeon!</p>
  <button class="btn" onclick="showScreen('screen-pick')">Enter World</button>
</div>

<div id="screen-pick" class="screen">
  <div class="mc-container">
    <h2>Select Skin</h2>
    <div id="pick-status" style="text-align:center; margin-bottom:10px; font-weight:bold; font-size: 12px;">
      <span id="pick-status-p1" style="color:#3b5fe2">P1: Picking...</span> | <span id="pick-status-p2">P2: Waiting</span>
    </div>
    <div class="avatar-grid" id="pick-grid"></div>
    <button class="btn" id="start-race-btn" onclick="startRace()" disabled>Start Game</button>
  </div>
</div>

<div id="screen-game" class="screen">
  <div class="race-wrap">
    <div class="player-col" id="col-p1">
      <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px;">
        <span id="av-p1" style="font-size:30px"></span>
        <span id="name-p1" style="font-weight:bold; color:#1a2d8a; font-size:14px;"></span>
      </div>
      <div class="progress-dots" id="dots-p1"></div>
      <div id="panel-p1"></div>
    </div>

    <div class="player-col" id="col-p2">
      <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px;">
        <span id="av-p2" style="font-size:30px"></span>
        <span id="name-p2" style="font-weight:bold; color:#2d5015; font-size:14px;"></span>
      </div>
      <div class="progress-dots" id="dots-p2"></div>
      <div id="panel-p2"></div>
    </div>
  </div>
</div>

<div id="screen-end" class="screen">
  <div class="mc-container" style="text-align:center">
    <div style="font-size:60px" id="end-icon">💎</div>
    <h1 id="end-title" style="color:#333; text-shadow:none;">Victory!</h1>
    <p id="end-msg" style="color:#333; text-shadow:none; font-weight:bold;"></p>
    <button class="btn" onclick="restartGame()">Respawn</button>
  </div>
</div>

<script>
  let audioCtx;
  function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'click') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(10, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      osc.start(); osc.stop(now + 0.1);
    } 
    else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(); osc.stop(now + 0.3);
    } 
    else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.linearRampToValueAtTime(70, now + 0.2);
      gain.gain.setValueAtTime(0.1, now);
      osc.start(); osc.stop(now + 0.2);
    } 
    else if (type === 'win') {
      [523, 659, 784, 1046].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f;
        g.gain.setValueAtTime(0.1, now + (i * 0.1));
        g.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.4);
        o.start(now + (i * 0.1)); o.stop(now + (i * 0.1) + 0.4);
      });
    }
  }

  const avatars = [
    {icon:'🧟',name:'Zombie'},{icon:'💀',name:'Skeleton'},
    {icon:'🐷',name:'Pigman'},{icon:'🌲',name:'Steve'},
    {icon:'🛡️',name:'Knight'},{icon:'🧪',name:'Witch'},
    {icon:'🐉',name:'Dragon'},{icon:'🐱',name:'Ocelot'}
  ];

  const allQuestions = [
    { clue:"I wear a big helmet and heavy protective clothing. When a building is on fire, I rush in to save people. I carry a hose and sometimes an axe. My job is very dangerous but I love helping others stay safe.", answer:"Firefighter", choices:["Firefighter","Police Officer","Engineer","Scientist"] },
    { clue:"I wear a uniform and a badge. I patrol the streets to keep people safe. I can arrest someone who breaks the law. People call me when there is an emergency or a crime.", answer:"Police Officer", choices:["Reporter","Police Officer","Singer","Firefighter"] },
    { clue:"I play a sport with a bat and a ball. I run around bases and try to score points for my team. Games are played in a large stadium and fans cheer loudly. I practice a lot to throw, catch, and hit well.", answer:"Baseball Player", choices:["Baseball Player","Singer","YouTuber","Engineer"] },
    { clue:"I write stories and news for TV, newspaper, or the internet. I interview people and ask lots of questions. I go where important things happen to tell the world what is going on. My job is to share the truth.", answer:"Reporter", choices:["Reporter","Scientist","Police Officer","YouTuber"] },
    { clue:"I work in a lab and do experiments. I ask questions about the world and try to find answers. I use microscopes, chemicals, and data. My discoveries can help make new medicine or explain how nature works.", answer:"Scientist", choices:["Engineer","Scientist","Reporter","Baseball Player"] },
    { clue:"I perform on stage and record music. People listen to my songs on the radio and on their phones. I use my voice as my instrument. Sometimes I go on tour and perform in big concerts around the world.", answer:"Singer", choices:["Singer","Firefighter","YouTuber","Scientist"] },
    { clue:"I make videos and post them online for people to watch. I film myself talking, playing games, cooking, or doing challenges. I edit the videos on my computer. I earn money when many people subscribe to my channel.", answer:"YouTuber", choices:["Reporter","Singer","YouTuber","Police Officer"] },
    { clue:"I use math and science to design and build things — like bridges, machines, phones, or buildings. I solve problems and make sure everything works safely. I often draw detailed plans before building anything.", answer:"Engineer", choices:["Engineer","Scientist","Baseball Player","Firefighter"] }
  ];

  let p1Av = null, p2Av = null, pickPhase = 1;
  let p1Q = [], p2Q = [], p1Idx = 0, p2Idx = 0;

  function showScreen(id) {
    playSound('click');
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function shuffle(arr) { return arr.slice().sort(() => Math.random() - 0.5); }

  function buildPickGrid() {
    const grid = document.getElementById('pick-grid');
    grid.innerHTML = '';
    avatars.forEach((av, i) => {
      const d = document.createElement('div');
      d.className = 'avatar-card';
      d.id = 'pav-' + i;
      d.innerHTML = `<div style="font-size:32px">${av.icon}</div><div style="font-size:10px; font-weight:bold; margin-top:5px;">${av.name.toUpperCase()}</div>`;
      d.onclick = () => pickAvatar(i);
      grid.appendChild(d);
    });
  }

  function pickAvatar(i) {
    playSound('click');
    if (pickPhase === 1) {
      p1Av = i;
      document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected-p1'));
      document.getElementById('pav-' + i).classList.add('selected-p1');
      document.getElementById('pick-status-p1').textContent = 'P1: ' + avatars[i].name;
      document.getElementById('pick-status-p2').style.color = '#5aa32a';
      document.getElementById('pick-status-p2').textContent = 'P2: Picking...';
      pickPhase = 2;
    } else if (pickPhase === 2) {
      if (i === p1Av) return;
      p2Av = i;
      document.getElementById('pav-' + i).classList.add('selected-p2');
      document.getElementById('pick-status-p2').textContent = 'P2: ' + avatars[i].name;
      document.getElementById('start-race-btn').disabled = false;
      pickPhase = 3;
    }
  }

  function startRace() {
    playSound('win');
    p1Idx = 0; p2Idx = 0;
    p1Q = shuffle(allQuestions);
    p2Q = shuffle(allQuestions);
    document.getElementById('av-p1').textContent = avatars[p1Av].icon;
    document.getElementById('av-p2').textContent = avatars[p2Av].icon;
    document.getElementById('name-p1').textContent = avatars[p1Av].name.toUpperCase();
    document.getElementById('name-p2').textContent = avatars[p2Av].name.toUpperCase();
    buildDots(1); buildDots(2);
    showScreen('screen-game');
    renderPanel(1); renderPanel(2);
  }

  function buildDots(player) {
    const wrap = document.getElementById('dots-p' + player);
    wrap.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.id = 'dot-p' + player + '-' + i;
      wrap.appendChild(d);
    }
  }

  function renderPanel(player) {
    const panel = document.getElementById('panel-p' + player);
    const q = player === 1 ? p1Q[p1Idx] : p2Q[p2Idx];
    const idx = player === 1 ? p1Idx : p2Idx;
    if (!q) return;
    const shuffled = shuffle(q.choices);
    panel.innerHTML = `
      <div style="font-size:10px; font-weight:bold; color:#555; margin-bottom:5px">QUEST ${idx+1}/8</div>
      <div class="clue-box">${q.clue}</div>
      ${shuffled.map(c => `<button class="ans-btn" onclick="checkAns(${player}, '${c}', '${q.answer}', this)">${c}</button>`).join('')}
    `;
  }

  function checkAns(player, choice, correct, btn) {
    const panel = document.getElementById('panel-p' + player);
    panel.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
    const idx = player === 1 ? p1Idx : p2Idx;
    const fb = document.createElement('div');
    const isCorrect = (choice === correct);
    
    if (isCorrect) {
      playSound('correct');
      btn.classList.add('correct');
      fb.className = 'feedback-sm correct';
      fb.textContent = '★ ADVANCING...';
      document.getElementById('dot-p' + player + '-' + idx).className = 'dot done-p' + player;
    } else {
      playSound('wrong');
      btn.classList.add('wrong');
      panel.querySelectorAll('.ans-btn').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
      fb.className = 'feedback-sm wrong';
      fb.textContent = '✖ FAILED! Correct: ' + correct;
    }
    
    panel.appendChild(fb);
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn';
    nextBtn.style.width = "100%";
    nextBtn.textContent = (idx === 7) ? 'Finish Race' : 'Next Quest';
    nextBtn.onclick = () => { playSound('click'); advance(player); };
    panel.appendChild(nextBtn);
  }

  function advance(player) {
    if (player === 1) { p1Idx++; if (p1Idx >= 8) { escaped(1); return; } renderPanel(1); }
    else { p2Idx++; if (p2Idx >= 8) { escaped(2); return; } renderPanel(2); }
  }

  function escaped(winner) {
    playSound('win');
    const wAv = winner === 1 ? p1Av : p2Av;
    const lAv = winner === 1 ? p2Av : p1Av;
    document.getElementById('end-title').textContent = 'PLAYER ' + winner + ' WINS!';
    document.getElementById('end-msg').textContent = avatars[wAv].name + " finished the race faster than " + avatars[lAv].name + "!";
    showScreen('screen-end');
  }

  function restartGame() {
    location.reload();
  }

  buildPickGrid();
</script>
</body>
</html>
